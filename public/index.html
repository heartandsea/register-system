<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .card h1 { text-align: center; margin-bottom: 8px; color: #1e293b; }
        .card p { text-align: center; color: #64748b; margin-bottom: 28px; font-size: 14px; }
        .input-group { margin-bottom: 18px; }
        .input-group label { display: block; font-weight: 600; margin-bottom: 6px; color: #334155; font-size: 14px; }
        .input-group input, .input-group select {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }
        .input-group input:focus, .input-group select:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }
        .birthday-group { display: flex; gap: 12px; }
        .birthday-group select { flex: 1; }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102,126,234,0.4); }
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            display: none;
            font-size: 14px;
        }
        .success { background: #d1fae5; color: #065f46; display: block; }
        .error { background: #fee2e2; color: #991b1b; display: block; }
        .info { background: #dbeafe; color: #1e40af; display: block; }
        footer { text-align: center; margin-top: 24px; font-size: 12px; color: #94a3b8; }
    </style>
</head>
<body>
<div class="card">
    <h1>📝 创建账户</h1>
    <p>请填写真实信息完成注册</p>
    
    <form id="registerForm">
        <div class="input-group">
            <label>真实姓名 *</label>
            <input type="text" id="realname" required placeholder="张三">
        </div>
        <div class="input-group">
            <label>账户名 *</label>
            <input type="text" id="username" required placeholder="4~20个字符">
        </div>
        <div class="input-group">
            <label>密码 *</label>
            <input type="password" id="password" required placeholder="至少6位">
        </div>
        <div class="input-group">
            <label>出生年月日 *</label>
            <div class="birthday-group">
                <select id="year" required><option value="">年份</option></select>
                <select id="month" required><option value="">月份</option></select>
                <select id="day" required><option value="">日期</option></select>
            </div>
        </div>
        <div class="input-group">
            <label>QQ / 微信号 *</label>
            <input type="text" id="contact" required placeholder="QQ号或微信号">
        </div>
        <button type="submit">立即注册</button>
    </form>
    <div id="message" class="message"></div>
    <footer>🔒 信息加密传输 | 注册信息将发送至管理员</footer>
</div>

<script>
    // 生成日期下拉框
    const yearSelect = document.getElementById('year');
    const monthSelect = document.getElementById('month');
    const daySelect = document.getElementById('day');
    
    const now = new Date();
    for (let y = now.getFullYear(); y >= now.getFullYear() - 100; y--) {
        yearSelect.innerHTML += `<option value="${y}">${y}</option>`;
    }
    for (let m = 1; m <= 12; m++) {
        monthSelect.innerHTML += `<option value="${m}">${m}月</option>`;
    }
    
    function updateDays() {
        const year = yearSelect.value;
        const month = monthSelect.value;
        if (year && month) {
            const days = new Date(year, month, 0).getDate();
            daySelect.innerHTML = '<option value="">日期</option>';
            for (let d = 1; d <= days; d++) {
                daySelect.innerHTML += `<option value="${d}">${d}日</option>`;
            }
        }
    }
    yearSelect.addEventListener('change', updateDays);
    monthSelect.addEventListener('change', updateDays);
    
    const form = document.getElementById('registerForm');
    const msgDiv = document.getElementById('message');
    
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const realname = document.getElementById('realname').value.trim();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const contact = document.getElementById('contact').value.trim();
        const year = yearSelect.value;
        const month = monthSelect.value;
        const day = daySelect.value;
        
        if (!realname || !username || !password || !contact || !year || !month || !day) {
            msgDiv.className = 'message error';
            msgDiv.textContent = '请填写所有带*的字段';
            return;
        }
        if (password.length < 6) {
            msgDiv.className = 'message error';
            msgDiv.textContent = '密码长度至少6位';
            return;
        }
        
        msgDiv.className = 'message info';
        msgDiv.textContent = '正在注册，请稍候...';
        
        const data = {
            realname, username, password, contact,
            birthDate: `${year}年${month}月${day}日`
        };
        
        try {
            // 注意：这里使用相对路径 /api/register，部署后会自动指向后端
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            if (result.success) {
                msgDiv.className = 'message success';
                msgDiv.textContent = '✅ 注册成功！';
                form.reset();
                yearSelect.value = '';
                monthSelect.value = '';
                daySelect.innerHTML = '<option value="">日期</option>';
            } else {
                msgDiv.className = 'message error';
                msgDiv.textContent = '注册失败，请稍后重试';
            }
        } catch (err) {
            msgDiv.className = 'message error';
            msgDiv.textContent = '服务器连接失败，请确保后端服务已启动';
        }
    });
</script>
</body>
</html>
